<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gitpin ∆ — Pinterest for GitHub</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- highlight.js for syntax highlighting (vendored) -->
  <link rel="stylesheet" href="vendor/github-dark.min.css" />
  <script src="vendor/highlight.min.js"></script>
</head>
<body>
  <!-- ═══════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo" id="logoHome">
        <span class="logo-icon">∆</span>
        <span class="logo-text">Gitpin</span>
      </a>

      <form class="search-form" id="searchForm" role="search">
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search GitHub repositories…"
          autocomplete="off"
          aria-label="Search GitHub repositories"
        />
        <button type="submit" class="search-btn" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </form>

      <nav class="header-nav">
        <button class="nav-btn active" data-tab="discover" id="discoverTab">Discover</button>
        <button class="nav-btn" data-tab="pinned" id="pinnedTab">
          Pinned
          <span class="pin-count badge" id="pinCount"></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════════ -->
  <main class="main-content">

    <!-- Toolbar / Filter bar -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <span class="toolbar-title" id="toolbarTitle">Trending Repositories</span>
      </div>
      <div class="toolbar-right">
        <select class="filter-select" id="languageFilter" aria-label="Filter by language">
          <option value="">All Languages</option>
          <option value="javascript">JavaScript</option>
          <option value="typescript">TypeScript</option>
          <option value="python">Python</option>
          <option value="go">Go</option>
          <option value="rust">Rust</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
          <option value="csharp">C#</option>
          <option value="ruby">Ruby</option>
          <option value="swift">Swift</option>
          <option value="kotlin">Kotlin</option>
          <option value="php">PHP</option>
        </select>
        <select class="filter-select" id="sortFilter" aria-label="Sort by">
          <option value="stars">Most Stars</option>
          <option value="forks">Most Forks</option>
          <option value="updated">Recently Updated</option>
        </select>
      </div>
    </div>

    <!-- Loading indicator -->
    <div class="loading-state" id="loadingState" aria-live="polite">
      <div class="spinner"></div>
      <p>Loading repositories…</p>
    </div>

    <!-- Empty / Error state -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">∆</div>
      <p id="emptyMessage">No repositories found.</p>
    </div>

    <!-- Repo grid -->
    <div class="repo-grid" id="repoGrid" aria-label="Repository grid"></div>

  </main>

  <!-- ═══════════════════════════════════════════════
       FILE EXPLORER PANEL (slide-in)
  ═══════════════════════════════════════════════ -->
  <aside class="file-panel" id="filePanel" role="complementary" aria-label="File Explorer" aria-hidden="true">
    <div class="file-panel-header">
      <div class="file-panel-title">
        <span class="file-panel-icon">∆</span>
        <div>
          <div class="file-panel-repo-name" id="filePanelRepoName">Repository</div>
          <div class="file-panel-repo-meta" id="filePanelRepoMeta"></div>
        </div>
      </div>
      <div class="file-panel-actions">
        <a class="icon-btn" id="filePanelFork" href="#" target="_blank" rel="noopener noreferrer" title="Fork on GitHub" aria-label="Fork on GitHub">
          <!-- fork icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/>
            <path d="M6 9v2a3 3 0 0 0 3 3h6a3 3 0 0 0 3-3V9"/>
          </svg>
          Fork
        </a>
        <a class="icon-btn" id="filePanelGH" href="#" target="_blank" rel="noopener noreferrer" title="Open on GitHub" aria-label="Open on GitHub">
          <!-- github icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.185 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.014-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.205 22 16.448 22 12.021 22 6.484 17.522 2 12 2z"/>
          </svg>
          GitHub
        </a>
        <button class="icon-btn close-btn" id="filePanelClose" aria-label="Close file panel">✕</button>
      </div>
    </div>

    <div class="file-panel-body">
      <!-- File tree -->
      <div class="file-tree-pane" id="fileTreePane">
        <div class="file-tree-loading" id="fileTreeLoading">
          <div class="spinner spinner-sm"></div> Loading files…
        </div>
        <ul class="file-tree" id="fileTree" role="tree"></ul>
      </div>

      <!-- File content viewer -->
      <div class="file-viewer-pane hidden" id="fileViewerPane">
        <div class="file-viewer-header">
          <button class="icon-btn back-btn" id="fileViewerBack" aria-label="Back to file tree">
            ← Back
          </button>
          <span class="file-viewer-filename" id="fileViewerFilename"></span>
          <button class="icon-btn copy-btn" id="fileViewerCopy" aria-label="Copy file contents">
            Copy
          </button>
        </div>
        <div class="file-viewer-content">
          <pre class="file-code" id="fileViewerCode"><code id="fileViewerCodeInner"></code></pre>
        </div>
      </div>
    </div>
  </aside>

  <!-- Overlay backdrop -->
  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════════ -->
  <script src="js/github.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
